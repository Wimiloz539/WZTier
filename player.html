<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 id="playerName"></h1>
<div id="stats"></div>

<script src="script.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const playerNameParam = params.get("name");

async function loadPlayer() {
    if (!playerNameParam) {
        document.getElementById("playerName").innerText = "Jugador no encontrado";
        return;
    }

    const p = allPlayers.find(x => x.name === playerNameParam);
    if (!p) {
        document.getElementById("playerName").innerText = "Jugador no encontrado";
        return;
    }

    document.getElementById("playerName").innerText = p.name;

    let html = "";
    modes.forEach(m => {
        if (p[m] && p[m] !== "None") {
            html += `<p>${modeIcons[m]} ${m}: ${p[m]}</p>`;
        }
    });

    document.getElementById("stats").innerHTML = html || "<p>Sin tiers asignados</p>";
}

// loadData() ya fue llamado por script.js. Esperamos a que los datos estén listos.
const _checkReady = setInterval(() => {
    if (allPlayers.length > 0 || document.readyState === "complete") {
        clearInterval(_checkReady);
        loadPlayer();
    }
}, 100);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WZTiers | Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <h1>Admin Dashboard</h1>
        
        <div id="loginSection" style="margin-bottom: 30px;">
            <input type="password" id="adminPassInput" placeholder="Contraseña Admin">
            <button onclick="tryLogin()">🔑 Acceder</button>
        </div>

        <div id="adminContent" style="display: none;">
            <div style="background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 20px;">
                <input type="text" id="playerName" placeholder="Nombre del Jugador">
                <button onclick="addPlayer()" class="btn-add">Añadir Nuevo</button>
            </div>
            <div id="playersAdminList"></div>
        </div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="rank-card">
            <h2 id="editName" style="margin-top:0">Editar</h2>
            <div id="editModes" class="edit-grid"></div>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button onclick="saveEdit()" class="btn-edit" style="flex:1">Guardar</button>
                <button onclick="closeEditModal()" style="flex:1">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

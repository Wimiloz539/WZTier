<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WZTiers | Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <h1>Admin Panel</h1>
        <div id="login">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="auth()">Entrar</button>
        </div>
        <div id="panel" style="display:none;">
            <div class="admin-add">
                <input type="text" id="newPlayer" placeholder="Minecraft Name">
                <button onclick="addPlayer()">Agregar</button>
            </div>
            <div id="adminList"></div>
        </div>
    </div>
    <script>
        const KEY = "WZ21TIERS539";
        function auth() {
            if(document.getElementById("pass").value === KEY) {
                document.getElementById("login").style.display="none";
                document.getElementById("panel").style.display="block";
                // Aquí podés reusar funciones de carga de script.js
            }
        }
    </script>
</body>
</html>

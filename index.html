<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WZTiers | Ranking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <h1>WZTiers Ranking</h1>

        <nav class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('overall')">🏆 Overall</button>
            <button class="tab-btn" onclick="switchTab('sword')">⚔️ Sword</button>
            <button class="tab-btn" onclick="switchTab('vanilla')">📦 Vanilla</button>
            <button class="tab-btn" onclick="switchTab('uhc')">❤️ UHC</button>
            <button class="tab-btn" onclick="switchTab('pot')">🧪 Pot</button>
            <button class="tab-btn" onclick="switchTab('smp')">🌍 SMP</button>
            <button class="tab-btn" onclick="switchTab('axe')">🪓 Axe</button>
            <button class="tab-btn" onclick="switchTab('mace')">🔨 Mace</button>
        </nav>

        <div id="rankingContainer"></div>

        <footer class="admin-footer">
            <div id="loginSection">
                <input type="password" id="adminPassInput" placeholder="Contraseña Admin">
                <button onclick="tryLogin()">🔑 Acceder</button>
            </div>
            
            <div id="adminContent" style="display: none;">
                <div class="admin-controls">
                    <input type="text" id="playerName" placeholder="Nombre del jugador">
                    <button onclick="addPlayer()" class="btn-add">Añadir Jugador</button>
                </div>
                <div id="playersAdminList"></div>
            </div>
        </footer>
    </div>

    <div id="playerModal" class="modal-overlay">
        <div class="profile-card">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div class="profile-header">
                <div class="profile-avatar-container">
                    <img id="playerAvatar" src="" alt="Skin">
                </div>
                <h2 id="modalName">Nombre</h2>
                <div id="modalRegionTag" class="region-badge-large">NA</div>
            </div>
            <div class="profile-body">
                <p class="section-title">ESTADÍSTICAS DE TIER</p>
                <div id="modalStats" class="tiers-row-profile"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

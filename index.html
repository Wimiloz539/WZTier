<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WZTiers | Ranking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <h1>WZTiers Ranking</h1>

        <nav class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('overall', event)">🏆 Overall</button>
            <button class="tab-btn" onclick="switchTab('sword', event)">⚔️ Sword</button>
            <button class="tab-btn" onclick="switchTab('axe', event)">🪓 Axe</button>
            <button class="tab-btn" onclick="switchTab('crystal', event)">💎 Crystal</button>
            <button class="tab-btn" onclick="switchTab('uhc', event)">❤️ UHC</button>
            <button class="tab-btn" onclick="switchTab('smp', event)">🌍 SMP</button>
            <button class="tab-btn" onclick="switchTab('nethpot', event)">🧪 NethPot</button>
            <button class="tab-btn" onclick="switchTab('diamondpot', event)">🥵 DiamondPot</button>
            <button class="tab-btn" onclick="switchTab('mace', event)">🔨 Mace</button>
        </nav>

        <div id="rankingContainer"></div>
    </div>

    <div id="playerModal" class="modal-overlay">
        <div class="profile-card">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div class="profile-header">
                <div class="profile-avatar-container">
                    <img id="playerAvatar" src="" alt="Skin">
                </div>
                <h2 id="modalName">Nombre</h2>
                <div id="modalRegionTag" class="region-badge-large">SA</div>
            </div>
            <div class="profile-body">
                <p class="section-title">ESTADÍSTICAS DE TIER</p>
                <div id="modalStats" class="tiers-row-profile"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
